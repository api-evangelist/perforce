specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Perforce
providerId: perforce
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Version Control
  - DevOps
  - Application Lifecycle Management
description: FOCUS-aligned FinOps for Perforce - per-user subscription model across the Helix /
  P4 product family with a published $39 per-user-per-month Cloud SKU and contact-sales tiers for
  Scale, Platform, and the broader portfolio. APIs are included with the product license rather
  than separately metered.
sources:
  - https://www.perforce.com/products/helix-core
  - https://www.perforce.com/resources/vcs/helix-core-pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Perforce Software, Inc.
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Perforce
  ServiceCategory: Developer Tools
  ServiceSubcategory: Version Control
  ProviderName: Perforce
  PublisherName: Perforce Software, Inc.
  InvoiceIssuerName: Perforce Software, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
meters:
  - name: p4_cloud_user_month
    description: Monthly per-user seat for the published P4 Cloud SKU ($39 per user per month).
    unit: seat-month
    aggregation: count
    dimensions:
      - product
      - tenant
  - name: p4_self_hosted_user_year
    description: Annual per-user seat for self-hosted Helix Core (Free / Scale / Platform tiers).
    unit: seat-year
    aggregation: count
    dimensions:
      - product
      - tier
  - name: p4_cloud_storage
    description: Hosted Helix Core storage (64 GB included with Cloud; overage by upgrade /
      contact sales).
    unit: GB
    aggregation: max
    dimensions:
      - tenant
  - name: helix_alm_user_year
    description: Per-user seat for Helix ALM (Issues / Test / Requirements). Quoted annually by
      sales.
    unit: seat-year
    aggregation: count
    dimensions:
      - module
  - name: hansoft_user_year
    description: Per-user seat for Hansoft Agile planning. Quoted annually by sales.
    unit: seat-year
    aggregation: count
    dimensions:
      - team
  - name: teamhub_user_year
    description: Per-user seat for Helix TeamHub (Git collaboration). Quoted annually by sales.
    unit: seat-year
    aggregation: count
    dimensions:
      - tenant
  - name: p4_dam_user_year
    description: Per-user seat for P4 DAM (digital asset management). Bundled with Platform tier.
    unit: seat-year
    aggregation: count
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: Track named-user counts via each Perforce product's admin console (p4 users, Swarm
      admin, Helix ALM admin); reconcile against the renewal SKU each year.
  - name: Allocation
    description: Allocate seats by tagging Perforce users to studios / business units in the user
      directory or via Helix Authentication Service group claims; map game-studio or product-line
      ownership to the renewal contract.
  - name: Optimization
    description: Move teams above 5 users from the Free tier to P4 Cloud (or self-host) before
      hitting the 1000-file limit; consolidate Hansoft / Helix ALM / TeamHub renewals onto a
      single Perforce contract for negotiation; right-size P4 Cloud storage to the 64 GB
      included envelope.
  - name: Accountability
    description: Engineering / studio leadership owns the seat count per renewal; finance reviews
      active-developer counts against contracted seats annually before renewal.
maintainers:
