specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Perforce
providerId: perforce
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Version Control
  - DevOps
  - Source Control
  - SCM
  - Application Lifecycle Management
  - Project Management
description: Perforce sells per-user / per-developer subscriptions for its product portfolio (Helix
  Core / P4, Helix Swarm, Helix ALM, Helix TeamHub, Hansoft, P4 Plan, P4 DAM). Public pricing is
  published only for the Helix Core / P4 product family - a Free tier for up to 5 users / 20
  workspaces / 1000 files, a Cloud tier at $39 per user per month for up to 100 users with 64 GB
  storage, and Scale and Platform tiers at custom-quoted annual pricing. Other product lines
  (Hansoft, Helix ALM, TeamHub, P4 DAM, Hosted P4 Plan, Helix Authentication Service) are quoted by
  Perforce sales. APIs ship with the underlying product license rather than as a separately
  metered SKU.
sources:
  - https://www.perforce.com/products/helix-core
  - https://www.perforce.com/resources/vcs/helix-core-pricing
plans:
  - id: perforce-p4-free
    name: P4 (Helix Core) - Free
    type: freemium
    description: Free tier for Helix Core / P4 covering small teams of up to 5 users.
    entries:
      - label: Users
        name: users
        type: quota
        metric: seat
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Workspaces
        name: workspaces
        type: quota
        metric: workspace
        limit: 20
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Files
        name: files_total
        type: quota
        metric: file
        limit: 1000
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Git Repositories
        name: git_repos
        type: quota
        metric: repository
        limit: 3
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Lifetime Support Cases
        name: support_cases
        type: quota
        metric: case
        limit: 3
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: P4 Code Review
      - name: Cloud Deployment Templates
      - name: Free Training
      - name: Self-Hosted Helix Core
  - id: perforce-p4-cloud
    name: P4 Cloud
    type: subscription
    description: Hosted Helix Core for teams of up to 100 users with unlimited workspaces, support,
      and 64 GB storage.
    entries:
      - label: Per-User Subscription
        name: per_user_subscription
        type: subscription
        metric: seat
        limit: 100
        timeFrame: month
        geo: global
        unit: 1
        price: '$39/user/month'
        userMultiplied: true
      - label: Included Storage
        name: included_storage
        type: quota
        metric: GB
        limit: 64
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Hosted Helix Core
      - name: Unlimited Workspaces
      - name: Unlimited Support Cases
      - name: Automatic Updates and Backups
      - name: P4 Code Review (3+ users)
  - id: perforce-p4-scale
    name: P4 Scale
    type: enterprise
    description: Self-hosted Helix Core for unlimited users; custom-quoted, billed annually.
    entries:
      - label: Per-User Subscription
        name: per_user_subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Unlimited Users
      - name: Unlimited Workspaces
      - name: Unlimited Support Cases
      - name: Unlimited Git Repos
      - name: Optional P4 DAM Add-On
  - id: perforce-p4-platform
    name: P4 Platform
    type: enterprise
    description: Top-tier Helix Core bundle that adds P4 DAM and P4 Plan; custom-quoted annual
      contract.
    entries:
      - label: Per-User Subscription
        name: per_user_subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Everything in P4 Scale
      - name: P4 DAM Included
      - name: P4 Plan Included
  - id: perforce-portfolio-other
    name: Other Perforce Products (Hansoft, Helix ALM, TeamHub, Helix Authentication, P4 Search)
    type: enterprise
    description: Per-user / per-server subscriptions for the rest of the Perforce portfolio. Pricing
      is not published; quoted by Perforce sales based on user count, deployment type (cloud vs
      on-prem), and required modules. APIs are included with the product license.
    entries:
      - label: Per-User Subscription
        name: per_user_subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Helix ALM (Issue / Test / Requirements)
      - name: Hansoft (Agile Planning)
      - name: P4 Plan
      - name: Helix TeamHub (Git)
      - name: P4 DAM
      - name: P4 Search
      - name: Helix Authentication Service
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
