components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication using Perforce username and password or
        ticket. The password can be a standard Perforce password or a
        Swarm-generated API ticket.

  schemas:
    Review:
      type: object
      description: >-
        A code review in Helix Swarm, representing a set of changes
        under review with participants, votes, and state.
      properties:
        id:
          type: integer
          description: The unique review identifier.
          example: abc123
        author:
          type: string
          description: The username of the review author.
          example: example_value
        changes:
          type: array
          items:
            type: integer
          description: List of changelist IDs associated with the review.
          example: []
        commits:
          type: array
          items:
            type: integer
          description: List of committed changelist IDs.
          example: []
        commitStatus:
          type: array
          items:
            type: object
          description: Status of commit operations.
          example: []
        created:
          type: integer
          description: Unix timestamp when the review was created.
          example: 10
        deployDetails:
          type: array
          items:
            type: object
          description: Deploy configuration details.
          example: []
        deployStatus:
          type: string
          description: The current deploy status.
          example: example_value
        description:
          type: string
          description: The review description.
          example: A sample description.
        groups:
          type: array
          items:
            type: object
          description: Reviewer groups assigned to the review.
          example: []
        participants:
          type: object
          additionalProperties:
            type: object
          description: >-
            Map of participant usernames to their participation details
            including votes and required status.
          example: example_value
        pending:
          type: boolean
          description: Whether the review has a pending changelist.
          example: true
        projects:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Map of project IDs to affected branch names.
          example: example_value
        roles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Map of roles to lists of usernames.
          example: example_value
        state:
          type: string
          enum:
          - needsReview
          - needsRevision
          - approved
          - archived
          - rejected
          description: The current state of the review.
          example: needsReview
        stateLabel:
          type: string
          description: A display-friendly label for the current state.
          example: example_value
        testDetails:
          type: array
          items:
            type: object
          description: Details of test runs.
          example: []
        testStatus:
          type: string
          description: The overall test status.
          example: example_value
        type:
          type: string
          description: The review type (default or personal).
          example: example_value
        updated:
          type: integer
          description: Unix timestamp when the review was last updated.
          example: 10
        updateDate:
          type: string
          format: date-time
          description: ISO 8601 formatted date when the review was last updated.
          example: '2026-01-15T10:30:00Z'
        versions:
          type: array
          items:
            type: object
            properties:
              difference:
                type: integer
              stream:
                type: string
              change:
                type: integer
              user:
                type: string
              time:
                type: integer
              pending:
                type: boolean
              archiveChange:
                type: integer
          description: List of review version objects.

          example: []
    Comment:
      type: object
      description: >-
        A comment on a review, changelist, or other topic in Helix Swarm.
      properties:
        id:
          type: integer
          description: The unique comment identifier.
          example: abc123
        attachments:
          type: array
          items:
            type: object
          description: File attachments on the comment.
          example: []
        body:
          type: string
          description: The comment body text.
          example: example_value
        context:
          type: object
          description: Inline context for file-level comments.
          properties:
            file:
              type: string
              description: The depot file path.
            leftLine:
              type: integer
              description: The left-side line number.
            rightLine:
              type: integer
              description: The right-side line number.
            content:
              type: string
              description: Adjacent content for context.
            version:
              type: integer
              description: The review version.
          example: example_value
        edited:
          type: integer
          description: Unix timestamp of the last edit, or null if not edited.
          example: 10
        flags:
          type: array
          items:
            type: string
          description: Flags applied to the comment.
          example: []
        likes:
          type: array
          items:
            type: string
          description: Usernames of users who liked the comment.
          example: []
        taskState:
          type: string
          enum:
          - comment
          - open
          - closed
          - verified
          description: The task state of the comment.
          example: comment
        time:
          type: integer
          description: Unix timestamp when the comment was created.
          example: 10
        topic:
          type: string
          description: The topic the comment belongs to, such as reviews/1234.
          example: example_value
        updated:
          type: integer
          description: Unix timestamp of the last update.
          example: 10
        user:
          type: string
          description: The username of the comment author.

          example: example_value
    Activity:
      type: object
      description: >-
        An entry in the Helix Swarm activity stream recording an action
        performed by a user.
      properties:
        id:
          type: integer
          description: The unique activity entry identifier.
          example: abc123
        action:
          type: string
          description: A past-tense description of the action performed.
          example: example_value
        change:
          type: integer
          description: The related changelist ID, if applicable.
          example: 10
        date:
          type: string
          format: date-time
          description: The date and time the activity occurred.
          example: '2026-01-15T10:30:00Z'
        description:
          type: string
          description: Contextual information about the activity.
          example: A sample description.
        link:
          type: string
          format: uri
          description: A URL linking to the activity target.
          example: https://www.example.com
        streams:
          type: array
          items:
            type: string
          description: The activity streams this entry appears in.
          example: []
        target:
          type: string
          description: The object that received the action.
          example: example_value
        topic:
          type: string
          description: An associated comment thread topic.
          example: example_value
        type:
          type: string
          description: The activity type classification.
          example: example_value
        user:
          type: string
          description: The username of the user who performed the action.

          example: example_value
    Project:
      type: object
      description: >-
        A project in Helix Swarm, grouping branches, members, and
        review settings.
      properties:
        id:
          type: string
          description: The project identifier.
          example: abc123
        name:
          type: string
          description: The project display name.
          example: Example Title
        description:
          type: string
          description: The project description.
          example: A sample description.
        members:
          type: array
          items:
            type: string
          description: List of project member usernames.
          example: []
        owners:
          type: array
          items:
            type: string
          description: List of project owner usernames.
          example: []
        subgroups:
          type: array
          items:
            type: string
          description: List of associated Perforce groups.
          example: []
        branches:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              paths:
                type: array
                items:
                  type: string
              moderators:
                type: array
                items:
                  type: string
          description: Branch definitions for the project.
          example: []
        deleted:
          type: boolean
          description: Whether the project has been deleted.
          example: true
        deploy:
          type: object
          description: Deploy configuration for the project.
          example: example_value
        emailFlags:
          type: object
          description: Email notification settings.
          example: user@example.com
        jobview:
          type: string
          description: A Perforce jobview expression for the project.
          example: example_value
        minimumUpVotes:
          type: integer
          description: Minimum number of up votes required for approval.
          example: 10
        private:
          type: boolean
          description: Whether the project is private.
          example: true
        retainDefaultReviewers:
          type: boolean
          description: Whether to retain default reviewers on review updates.
          example: true
        tests:
          type: object
          description: Test configuration for the project.
          example: example_value
        workflow:
          type: string
          description: The workflow identifier associated with the project.
          example: example_value
        defaults:
          type: object
          description: Default settings for the project.
          example: example_value
        readme:
          type: string
          description: The project readme content.

          example: example_value
  responses:
    BadRequest:
      description: >-
        The request was malformed or missing required parameters.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: A human-readable error message.
              details:
                type: object
                description: Additional details about the validation error.
    Unauthorized:
      description: >-
        Authentication is required or the provided credentials are invalid.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: A human-readable error message.
    NotFound:
      description: >-
        The requested resource was not found.
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: A human-readable error message.
